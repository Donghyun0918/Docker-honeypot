networks:
  honeypot-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET}

volumes:
  heralding_logs:
  honeyforge_db:

services:

  # ── HoneyForge 백엔드 ────────────────────────────────────────────────────────
  honeyforge-backend:
    build:
      context: ./dashboard/backend
      dockerfile: Dockerfile
    container_name: honeyforge-backend
    environment:
      - PROJECT_ROOT=/project
      - LOGS_ROOT=/honeypot_logs
      - PROJECT_HOST_PATH=${PROJECT_HOST}
      - LOGS_HOST_PATH=${HONEYPOT_LOGS_HOST}
      - SECRET_KEY=${SECRET_KEY}
      - DB_DIR=/app/data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker 제어
      - ${PROJECT_HOST}:/project:ro                 # 허니팟 설정 파일 읽기
      - ${HONEYPOT_LOGS_HOST}:/honeypot_logs        # 로그 읽기·쓰기
      - honeyforge_db:/app/data                     # SQLite DB 영속화
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── HoneyForge 프론트엔드 ────────────────────────────────────────────────────
  honeyforge-frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: honeyforge-frontend
    ports:
      - "3000:80"
    depends_on:
      - honeyforge-backend
    restart: unless-stopped

  # ── Cowrie: SSH/Telnet 허니팟 ─────────────────────────────────────────────
  cowrie:
    image: cowrie/cowrie:latest
    container_name: cowrie
    hostname: cowrie-ssh
    networks:
      honeypot-net:
        ipv4_address: ${COWRIE_IP}
    ports:
      - "2222:2222"
      - "2223:2223"
    volumes:
      - "./honeypots/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro"
      - "./honeypots/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro"
      - "${HONEYPOT_LOGS_HOST}/cowrie:/tmp/cowrie_logs"
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ── Heralding: HTTP/MySQL 인증 허니팟 ─────────────────────────────────────
  heralding:
    build:
      context: ./honeypots/heralding
      dockerfile: Dockerfile
    container_name: heralding
    hostname: heralding
    networks:
      honeypot-net:
        ipv4_address: ${HERALDING_IP}
    ports:
      - "8880:80"
      - "33306:3306"
    volumes:
      - "heralding_logs:/var/log/heralding"
    restart: unless-stopped

  # ── OpenCanary: 포트스캔/RDP/VNC 탐지 ────────────────────────────────────
  opencanary:
    build:
      context: ./honeypots/opencanary
      dockerfile: Dockerfile
    container_name: opencanary
    hostname: opencanary
    networks:
      honeypot-net:
        ipv4_address: ${OPENCANARY_IP}
    ports:
      - "2121:21"
      - "33389:3389"
      - "55900:5900"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/opencanary:/var/log/opencanary"
    restart: unless-stopped

  # ── Tanner: SNARE 분석 서버 스텁 ─────────────────────────────────────────
  tanner:
    build:
      context: ./honeypots/tanner
      dockerfile: Dockerfile
    container_name: tanner
    hostname: tanner
    networks:
      honeypot-net:
        ipv4_address: ${TANNER_IP}
    restart: unless-stopped

  # ── SNARE: 웹 공격 허니팟 ──────────────────────────────────────────────────
  snare:
    build:
      context: ./honeypots/snare
      dockerfile: Dockerfile
    container_name: snare
    hostname: snare
    networks:
      honeypot-net:
        ipv4_address: ${SNARE_IP}
    ports:
      - "8080:8080"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/snare:/opt/snare"
    restart: unless-stopped

  # ── Dionaea: SMB/멀웨어 허니팟 ───────────────────────────────────────────
  dionaea:
    image: dinotools/dionaea:latest
    container_name: dionaea
    hostname: dionaea
    networks:
      honeypot-net:
        ipv4_address: ${DIONAEA_IP}
    ports:
      - "4445:445"
      - "4421:21"
      - "14433:1433"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/dionaea:/opt/dionaea/var/log/dionaea"
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped

  # ── Mailoney: SMTP 허니팟 ─────────────────────────────────────────────────
  mailoney:
    build:
      context: ./honeypots/mailoney
      dockerfile: Dockerfile
    container_name: mailoney
    hostname: mailoney
    networks:
      honeypot-net:
        ipv4_address: ${MAILONEY_IP}
    ports:
      - "2525:25"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/mailoney:/var/log/mailoney"
    restart: unless-stopped

  # ── Conpot: ICS/SCADA 허니팟 ─────────────────────────────────────────────
  conpot:
    build:
      context: ./honeypots/conpot
      dockerfile: Dockerfile
    container_name: conpot
    hostname: conpot
    networks:
      honeypot-net:
        ipv4_address: ${CONPOT_IP}
    ports:
      - "10102:102"
      - "5502:502"
      - "16100:161/udp"
    volumes:
      - "${HONEYPOT_LOGS_HOST}/conpot:/var/log/conpot"
    restart: unless-stopped

  # ── Kali: 공격자 컨테이너 ────────────────────────────────────────────────
  kali:
    build:
      context: ./kali
      dockerfile: Dockerfile
    container_name: kali-attacker
    hostname: kali
    networks:
      honeypot-net:
        ipv4_address: ${KALI_IP}
    volumes:
      - "./attack_scenarios:/attack_scenarios"
      - "./scripts:/scripts"
      - "${HONEYPOT_LOGS_HOST}:/honeypot_logs"
      - "heralding_logs:/heralding_logs"
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: "no"
